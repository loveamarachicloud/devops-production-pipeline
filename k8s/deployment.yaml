apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-pipeline-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-pipeline-app
  template:
    metadata:
      labels:
        app: devops-pipeline-app
    spec:
      containers:
        - name: devops-pipeline-app
          image: devops-pipeline-app
          imagePullPolicy: Never
          ports:
            - containerPort: 80